name: stats

# Regenerates the profile stat SVGs from live GitHub data and commits them back.
# The cards are served from this repo, so they never depend on a third-party
# endpoint staying up.

on:
  schedule:
    - cron: '17 6 * * *' # daily, 06:17 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/generate-stats.mjs'
      - '.github/workflows/stats.yml'

permissions:
  contents: write

concurrency:
  group: stats
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Render stat cards
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # 5,000 req/hr instead of 60
          PROFILE_USER: ${{ github.repository_owner }}
        run: node scripts/generate-stats.mjs

      - name: Commit if changed
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add assets/languages.svg assets/rhythm.svg assets/stats-data.json
          git diff --staged --quiet || git commit -m 'chore: refresh profile stats'
          git push
