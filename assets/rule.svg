<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 8" width="880" height="8" role="img" aria-label="divider">
  <defs>
    <style>
      .hair {
        fill: none;
        stroke: #6B6863;
        stroke-width: 1;
        stroke-dasharray: 880;
        stroke-dashoffset: 880;
        animation: rule 1.6s cubic-bezier(.16,1,.3,1) forwards;
      }
      @keyframes rule { to { stroke-dashoffset: 0; } }
      .dot { fill: #6B6863; opacity: 0; animation: pop .5s ease-out 1.5s forwards; }
      @keyframes pop { to { opacity: 1; } }
    </style>
  </defs>
  <line class="hair" x1="0" y1="4" x2="880" y2="4" />
  <circle class="dot" cx="440" cy="4" r="2" />
</svg>
