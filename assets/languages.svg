  viewBox="0 0 880 320" width="880" height="320"
  role="img" aria-label="Languages by bytes: TypeScript 35%, HTML 33%, JavaScript 14%, CSS 6%, Swift 5%, Astro 3%. 46 original repositories, 12 languages."
  font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace"
>
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#141414" />
      <stop offset="100%" stop-color="#080808" />
    </radialGradient>
    <style>
      .ink { fill: #F2EFE8 } .dim { fill: #7E7B75 } .faint { fill: #413F3B }
      .serif { font-family: Georgia, 'Iowan Old Style', 'Times New Roman', serif }
      .rise { opacity: 0; animation: rise .8s cubic-bezier(.16,1,.3,1) forwards }
      @keyframes rise { from { opacity: 0; transform: translateY(5px) } to { opacity: 1; transform: none } }
      .frame {
        fill: none; stroke: #2B2926; stroke-width: 1;
        stroke-dasharray: 2400; stroke-dashoffset: 2400;
        animation: draw 1.2s cubic-bezier(.16,1,.3,1) forwards;
      }
      @keyframes draw { to { stroke-dashoffset: 0 } }
    </style>
  </defs>
  <rect x="1" y="1" width="878" height="318" rx="7" fill="url(#bg)" />
  <rect class="frame" x="1" y="1" width="878" height="318" rx="7" />

